name: Release

on:
  push:
    tags: ['v*']

env:
  GO_VERSION: "1.25.1"
  NODE_VERSION: "22"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/dbil

jobs:
  build_binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}" \
            -o "dist/dbil-${GOOS}-${GOARCH}" ./cmd/dbil
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dbil-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/dbil-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  build_image:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Build linux/amd64 locally first so we can inspect the real
      # uncompressed image size. `docker manifest inspect` returns the
      # *manifest* descriptor size (a few KB), not the image size — using
      # it as a guard would silently pass every build.
      - name: Build single-arch for size check
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: dbil:size-check
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect dbil:size-check --format '{{.Size}}')
          MB=$((SIZE/1024/1024))
          echo "dbil:size-check = ${SIZE} bytes (${MB} MB)"
          MAX=$((30 * 1024 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "FAIL: image > 30 MB ceiling"
            exit 1
          fi

      - id: push
        name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless OIDC)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE_NAME}@${DIGEST}"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build_image
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: spdx-json
          output-file: dbil-${{ github.ref_name }}.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dbil-${{ github.ref_name }}.spdx.json
          retention-days: 7

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: [build_binaries, build_image, sbom]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Pull only the artifacts we want on the release page. We explicitly
      # skip the .dockerbuild build-summary blobs auto-uploaded by
      # docker/build-push-action@v6 — they are storage attestations, not
      # user-facing assets, and they corrupt download retries.
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: release-files
          pattern: dbil-*
          merge-multiple: true

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: release-files

      - name: Show release contents
        run: ls -lh release-files/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "DBil ${GITHUB_REF_NAME}" \
            --generate-notes \
            release-files/*
