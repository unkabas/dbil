name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25.10"
  NODE_VERSION: "22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      # Go packages import web/embed.go which has //go:embed all:dist —
      # the directive parses at build time and fails if dist is empty.
      # Lint + test must build the SPA first.
      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build
      # golangci-lint v1 line (incl. v1.64.8, the latest v1 release) is
      # built on Go 1.24 and refuses Go 1.25 projects. Action @v7 is the
      # first action release that supports v2 binaries; pin explicitly to
      # a v2 version so 'latest' can't drift back to v1.
      # continue-on-error keeps a busted lint toolchain from blocking the
      # release on its own — lint failures still show up as a yellow X
      # so we don't lose the signal.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        continue-on-error: true
        with:
          version: v2.1.6
          args: --timeout=5m
      - name: lint-auth (every handler is auth-gated)
        run: go run ./scripts/lint-auth

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - run: go mod download
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build frontend
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -trimpath -ldflags="-s -w" -o bin/dbil-linux-${{ matrix.goarch }} ./cmd/dbil
      - name: Show binary size
        run: ls -lh bin/
