# Production-grade compose for dbil.
#
# Before first launch:
#   mkdir -p secrets
#   head -c 32 /dev/urandom > secrets/dbil_master_key
#   chmod 0400 secrets/dbil_master_key
#   echo "POSTGRES_PASSWORD=$(openssl rand -base64 24)" > .env
#
# First launch (creates admin + writes initial password to logs):
#   docker compose run --rm dbil init
#
# Routine launch:
#   docker compose up -d
#
# Read the admin password back any time:
#   docker compose exec dbil cat /data/initial-credentials.txt

services:
  # Init sidecar: distroless dbil runs as UID 65532, but Docker creates
  # named volumes owned by root. This one-shot container fixes /data
  # ownership before the main container starts. Runs once, exits cleanly.
  dbil-permissions:
    image: alpine:3
    command: chown -R 65532:65532 /data
    volumes:
      - dbil_data:/data

  dbil:
    image: ghcr.io/unkabas/dbil:latest
    command: ["serve"]
    # The image runs as nonroot (UID 65532). Override the group to 0 so
    # the container can read /var/run/docker.sock (the socket is
    # 0660 root:root on every distro we've seen). UID stays nonroot —
    # this isn't a privileged container, just one with root-group read.
    # For tighter setups, replace the socket mount with
    # tecnativa/docker-socket-proxy and drop the group override.
    user: "65532:0"
    ports:
      - "4242:4242"
    volumes:
      - dbil_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DBIL_DATA_DIR: "/data"
      DBIL_MASTER_KEY_FILE: "/run/secrets/dbil_master_key"
      DBIL_DISCOVER: "docker"
      # Compose prefixes the network name with the project. We
      # reference the raw form here; dbil's docker scanner matches on
      # any network name that appears in the engine's container list.
      DBIL_NETWORK: "appnet"
    secrets:
      - dbil_master_key
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - appnet
    depends_on:
      dbil-permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appdb
    labels:
      dbil.enable: "true"
      dbil.alias: "App DB"
      dbil.tag: "production"
      dbil.creds.username_env: "POSTGRES_USER"
      dbil.creds.password_env: "POSTGRES_PASSWORD"
      dbil.creds.database_env: "POSTGRES_DB"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - appnet

volumes:
  dbil_data:
  pg_data:

secrets:
  dbil_master_key:
    file: ./secrets/dbil_master_key

networks:
  # The explicit `name:` keeps the network from being prefixed with the
  # compose project name (otherwise it'd land as e.g. dbil_appnet and
  # DBIL_NETWORK above would need to match that prefixed form).
  appnet:
    name: appnet
