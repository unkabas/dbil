# Minimal Plan 1 example: bring up DBil alone and run `dbil init`.
# Once Plan 2 adds `dbil serve`, this file will gain a UI port and a
# Postgres companion service.
services:
  dbil:
    image: dbil:dev
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["init"]
    volumes:
      - ./dbil-data:/data
    environment:
      DBIL_DATA_DIR: "/data"
