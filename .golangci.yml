run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - gocritic
    - gofmt
    - goimports
    - bodyclose
    - noctx
    - sqlclosecheck
    - nilerr

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
