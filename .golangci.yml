# golangci-lint v2 config. v2 separates code formatters (gofmt, goimports)
# from logical linters; v1's flat list is no longer accepted.
version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - staticcheck
    - revive
    - gocritic
    - bodyclose
    - noctx
    - sqlclosecheck
    - nilerr
  settings:
    revive:
      rules:
        - name: exported
          disabled: false
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
